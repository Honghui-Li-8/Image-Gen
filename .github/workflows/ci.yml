name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.3"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install

      - name: Install proxy dependencies
        run: pnpm --dir proxy install --ignore-workspace || true

      - name: Build shared
        run: pnpm --filter image-gen-shared build

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Spell check
        run: pnpm spellcheck
        continue-on-error: true
